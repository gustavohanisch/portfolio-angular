<mat-sidenav-container class="container">

  <mat-sidenav #menu mode="over">
    <h3>Meu Portfólio</h3>

  <a mat-button routerLink="/" routerLinkActive="ativo" [routerLinkActiveOptions]="{ exact: true }" (click)="menu.close()">Início</a>
  <a mat-button routerLink="/sobre" routerLinkActive="ativo" (click)="menu.close()">Sobre</a>
  <a mat-button routerLink="/projetos" routerLinkActive="ativo" (click)="menu.close()">Projetos</a>
  <a mat-button routerLink="/contato" routerLinkActive="ativo" (click)="menu.close()">Contato</a>
  </mat-sidenav>

  <mat-sidenav-content>

    <mat-toolbar color="primary">
      <button mat-icon-button (click)="menu.toggle()">
        <mat-icon>menu</mat-icon>
      </button>

      <span>Meu Portfólio</span>
    </mat-toolbar>

    <main class="conteudo">
      <router-outlet></router-outlet>
    </main>

  </mat-sidenav-content>

</mat-sidenav-container>
